                  <span style={{fontSize:12,color:'#555',flex:1}}>→ grade {i+1}</span>
                </div>
              ))}
              <div style={{paddingTop:6,borderTop:'0.5px solid #E0E0E5'}}>
                <span style={{fontSize:12,color:'#999'}}>Above {((cls.thresholds||DEFAULT_THRESHOLDS)[3]).toFixed(2)} → grade 5</span>
              </div>
            </div></Card>
          </div>

          {/* Students */}
          <div>
            <SectionLabel title={`Students (${cls.students.length})`}/>
            <Card>
              {sorted.map((s,i)=>(<div key={s.id}>{i>0&&<Divider/>}
                {confirmRem===s.id?(<div style={{padding:'10px 16px',background:'#FCEBEB'}}>
                  <p style={{fontSize:13,color:'#791F1F',marginBottom:8}}>Remove {s.name}? Their grades will also be deleted.</p>
                  <div style={{display:'flex',gap:8}}>
                    <button onClick={()=>setConfirmRem(null)} style={{flex:1,padding:'7px',background:'none',border:'0.5px solid #F7C1C1',borderRadius:6,fontSize:13,color:'#791F1F',cursor:'pointer'}}>Cancel</button>
                    <button onClick={()=>removeStudent(s.id)} style={{flex:1,padding:'7px',background:'#791F1F',border:'none',borderRadius:6,fontSize:13,color:'white',cursor:'pointer',fontWeight:500}}>Remove</button>
                  </div>
                </div>):(<div style={{padding:'12px 16px',display:'flex',alignItems:'center',gap:12}}>
                  <span style={{fontSize:14,flex:1}}>{s.name}</span>
                  <button onClick={()=>!locked&&setConfirmRem(s.id)} style={{background:'none',border:'none',cursor:locked?'default':'pointer',padding:4,display:'flex',opacity:locked?0.3:1}}><XIcon size={16} color="#CCC"/></button>
                </div>)}
              </div>))}
              <Divider/>
              <div style={{padding:'10px 16px',display:'flex',gap:8}}>
                <input value={newSt} onChange={e=>!locked&&setNewSt(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!locked&&addStudent()} placeholder={locked?'Unlock to add students':'Add a student…'} disabled={locked} style={{flex:1,padding:'8px 10px',borderRadius:7,border:'0.5px solid #D0D0D8',fontSize:14,background:locked?'#F2F2F7':'white',color:'#1C1C1E',fontFamily:'inherit'}}/>
                <button onClick={()=>!locked&&addStudent()} disabled={locked||!newSt.trim()} style={{padding:'8px 14px',background:!locked&&newSt.trim()?PURPLE:'#E8E8EE',color:!locked&&newSt.trim()?'white':'#AAA',border:'none',borderRadius:7,fontSize:13,fontWeight:500,cursor:!locked&&newSt.trim()?'pointer':'default'}}>Add</button>
              </div>
            </Card>
          </div>

          {/* Delete class */}
          <div>{confirmDel?(<div style={{background:'#FCEBEB',border:'0.5px solid #F7C1C1',borderRadius:10,padding:'12px 14px'}}>
            <p style={{fontSize:13,color:'#791F1F',marginBottom:10}}>Delete "{cls.name}"? All data will be permanently removed.</p>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setConfirmDel(false)} style={{flex:1,padding:'9px',background:'none',border:'0.5px solid #F7C1C1',borderRadius:7,fontSize:13,color:'#791F1F',cursor:'pointer'}}>Cancel</button>
              <button onClick={deleteClass} style={{flex:1,padding:'9px',background:'#791F1F',border:'none',borderRadius:7,fontSize:13,color:'white',cursor:'pointer',fontWeight:500}}>Delete class</button>
            </div>
          </div>):(<OutlineBtn label="Delete class" onClick={()=>setConfirmDel(true)} danger/>)}</div>

        </div>
      </div>);
    }

    // ── Category overview bar row ─────────────────────────────────────────────
    function CategoryRow({label,grade,color,note,isTotal}){
      const pct=grade!=null?Math.max(0,Math.round((5-grade)/4*100)):0;
      return(
        <div style={{display:'flex',alignItems:'center',gap:10,padding:`${isTotal?11:8}px 16px`,background:isTotal?'#F8F8F8':'white'}}>
          <span style={{fontSize:12,color:isTotal?'#1C1C1E':'#666',width:96,flexShrink:0,fontWeight:isTotal?500:400}}>{label}</span>
          <div style={{flex:1,height:isTotal?8:5,background:'#EFEFEF',borderRadius:4,overflow:'hidden'}}>
            {grade!=null&&<div style={{width:`${pct}%`,height:'100%',background:color,borderRadius:4,opacity:0.85}}/>}
          </div>
          <span style={{fontSize:isTotal?13:12,color:grade!=null?'#1C1C1E':'#CCC',width:62,textAlign:'right',flexShrink:0,fontWeight:isTotal?500:400}}>
            {grade!=null?(note||fmtAvg(grade)):'—'}
          </span>
        </div>
      );
    }


    // ── Student Chart ─────────────────────────────────────────────────────────
    function StudentChart({partData, gradeData, clsColor, dateRange}){
      const W=320,H=175,PL=26,PR=14,PT=14,PB=28,PW=320-26-14,PH=175-14-28;
      const toMs=s=>new Date(s+'T12:00').getTime();

      const allD=[...partData,...gradeData].map(d=>d.date);
      if(dateRange){allD.push(dateRange.min,dateRange.max);}
      allD.sort();
      if(!allD.length)return null;

      const minMs=toMs(allD[0]),maxMs=toMs(allD[allD.length-1]);
      const span=Math.max(maxMs-minMs,86400000);
      const xOf=d=>(PL+(toMs(d)-minMs)/span*PW).toFixed(1);
      const yOf=g=>(PT+(g-1)/4*PH).toFixed(1);

      const partAvg=partData.length?partData.reduce((s,d)=>s+d.grade,0)/partData.length:null;

      const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const ticks=[];
      const cur=new Date(minMs);cur.setDate(1);
      while(cur.getTime()<=maxMs){ticks.push({ms:cur.getTime(),label:MONTHS[cur.getMonth()]});cur.setMonth(cur.getMonth()+1);}
      const ev=Math.ceil(ticks.length/6)||1;

      return(
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:'block'}}>
          {/* Y grid + labels */}
          {[1,2,3,4,5].map(g=>(
            <g key={g}>
              <line x1={PL} y1={yOf(g)} x2={PL+PW} y2={yOf(g)} stroke={g===1||g===5?'#E4E4E4':'#F0F0F0'} strokeWidth="1"/>
              <text x={PL-4} y={(parseFloat(yOf(g))+4).toFixed(1)} fontSize="9" fill="#C4C4C4" textAnchor="end">{g}</text>
            </g>
          ))}
          <text x={PL-4} y={PT-2} fontSize="8" fill="#D0D0D0" textAnchor="end">↑</text>

          {/* X axis */}
          <line x1={PL} y1={PT+PH} x2={PL+PW} y2={PT+PH} stroke="#E8E8E8" strokeWidth="0.5"/>
          {ticks.filter((_,i)=>i%ev===0).map((t,i)=>{
            const x=(PL+(t.ms-minMs)/span*PW).toFixed(1);
            return(
              <g key={i}>
                <line x1={x} y1={PT+PH} x2={x} y2={PT+PH+3} stroke="#DDD" strokeWidth="1"/>
                <text x={x} y={PT+PH+12} fontSize="9" fill="#BBBBBB" textAnchor="middle">{t.label}</text>
              </g>
            );
          })}

          {/* Avg dashed line */}
          {partAvg!==null&&<line x1={PL} y1={yOf(partAvg)} x2={PL+PW} y2={yOf(partAvg)} stroke={clsColor} strokeWidth="1" strokeDasharray="4 3" opacity="0.35"/>}

          {/* Participation line */}
          {partData.length>1&&<polyline points={partData.map(d=>`${xOf(d.date)},${yOf(d.grade)}`).join(' ')} fill="none" stroke={clsColor} strokeWidth="2" strokeLinejoin="round" opacity="0.85"/>}

          {/* Participation dots */}
          {partData.map((d,i)=><circle key={i} cx={xOf(d.date)} cy={yOf(d.grade)} r="3.5" fill={clsColor} stroke="white" strokeWidth="1.5"/>)}

          {/* Grade event circles */}
          {gradeData.map((d,i)=>{
            const x=xOf(d.date),y=parseFloat(yOf(d.grade));
            return(
              <g key={i}>
                <circle cx={x} cy={y} r="11" fill={TS[d.type]?.bg||'#EEE'} stroke={TS[d.type]?.fg||'#888'} strokeWidth="1.5"/>
                <text x={x} y={(y+4).toFixed(1)} fontSize="11" fill={TS[d.type]?.fg||'#888'} textAnchor="middle" fontWeight="600">{d.grade}</text>
              </g>
            );
          })}
        </svg>
      );
    }


    // ── Student Overview ───────────────────────────────────────────────────────
    function StudentScreen({data,push,pop,params}){
      const {classId,studentId}=params;
      const cls=data.classes.find(c=>c.id===classId);
      const student=cls?.students.find(s=>s.id===studentId);
      // All hooks must come before any conditional return
      const cutoff=data.semesterCutoff||null;
      const [semFilter,setSemFilter]=useState(params.semFilter||'all');
      const [collapsed,setCollapsed]=useState({participation:true,exams:true,tests:true,presentations:true,homework:true,gradeCalc:false,catOverview:true,stats:true});
      const toggle=key=>setCollapsed(c=>({...c,[key]:!c[key]}));
      if(!cls||!student)return null;
      const clsColor=getCC(cls);

      const partEntries=(data.lessons||[]).filter(l=>l.classId===classId&&!l.students[studentId]?.absent&&l.students[studentId]?.participation!=null&&inSem(l.date,semFilter,cutoff)).sort((a,b)=>b.date.localeCompare(a.date)).map(l=>({label:fmtDate(l.date),grade:l.students[studentId].participation,onClick:()=>push('lesson',{lessonId:l.id})}));
      const byType={};['Exam','Test','Presentation'].forEach(type=>{byType[type]=(data.gradeEvents||[]).filter(ev=>ev.classId===classId&&ev.type===type&&ev.scores?.[studentId]!=null&&inSem(ev.date,semFilter,cutoff)).sort((a,b)=>b.date.localeCompare(a.date)).map(ev=>{const note=ev.notes?.[studentId];return{label:ev.name,sublabel:note?`${fmtDate(ev.date)} · ${note}`:fmtDate(ev.date),grade:ev.scores[studentId],onClick:()=>push('gradeEvent',{classId,eventId:ev.id})};});});
      const hwEvents=(data.gradeEvents||[]).filter(ev=>ev.classId===classId&&ev.type==='Homework'&&inSem(ev.date,semFilter,cutoff)).sort((a,b)=>b.date.localeCompare(a.date));
      const hwStats=hwStatsForStudent(data,classId,studentId,{semFilter,cutoff});
      const partAvg=avg(partEntries.map(e=>e.grade));
      const typeAvg={};['Exam','Test','Presentation'].forEach(t=>{typeAvg[t]=avg(byType[t].map(e=>e.grade));});



      function GradeRow({label,sublabel,grade,onClick}){
        return(<div onClick={onClick} style={{padding:'10px 16px',display:'flex',alignItems:'center',gap:12,cursor:onClick?'pointer':'default'}}>
          <div style={{flex:1}}><div style={{fontSize:13,color:'#1C1C1E'}}>{label}</div>{sublabel&&<div style={{fontSize:12,color:'#999',marginTop:2}}>{sublabel}</div>}</div>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:13,background:GS[grade]?.bg,color:GS[grade]?.fg,padding:'3px 10px',borderRadius:5,fontWeight:500}}>{grade}</span>
            {onClick&&<ChevronRight size={13} color="#DDD"/>}
          </div>
        </div>);
      }

      // Card-based collapsible section: header always visible, rows inside when expanded
      function Section({title,entries,avgVal,emptyText,sectionKey}){
        const isColl=collapsed[sectionKey];
        return(<Card>
          <CollapsibleHeader title={title} right={avgVal!=null?`avg ${fmtAvg(avgVal)}`:null} collapsed={isColl} onToggle={()=>toggle(sectionKey)}/>
          {!isColl&&<>
            <Divider/>
            {entries.length===0
              ?<div style={{padding:'12px 16px'}}><p style={{fontSize:13,color:'#CCC'}}>{emptyText}</p></div>
              :entries.map((e,i)=><div key={i}>{i>0&&<Divider/>}<GradeRow {...e}/></div>)}
          </>}
        </Card>);
      }

      const partChartData=(data.lessons||[]).filter(l=>l.classId===classId&&!l.students[studentId]?.absent&&l.students[studentId]?.participation!=null&&inSem(l.date,semFilter,cutoff)).sort((a,b)=>a.date.localeCompare(b.date)).map(l=>({date:l.date,grade:l.students[studentId].participation}));
      const gradeChartData=(data.gradeEvents||[]).filter(ev=>ev.classId===classId&&ev.type!=='Homework'&&ev.scores?.[studentId]!=null&&inSem(ev.date,semFilter,cutoff)).sort((a,b)=>a.date.localeCompare(b.date)).map(ev=>({date:ev.date,grade:ev.scores[studentId],type:ev.type}));
      const gradeResult=computeGrade(data,classId,studentId,{semFilter,cutoff});
      const allChartDates=[...partChartData,...gradeChartData].map(d=>d.date).sort();
      const chartDateRange=allChartDates.length?{min:allChartDates[0],max:allChartDates[allChartDates.length-1]}:null;

      return(<div>
        <Bar title={student.name} onBack={pop} color={clsColor}/>
        <div style={{padding:'8px 16px 24px',display:'flex',flexDirection:'column',gap:8}}>
          {cutoff&&<SegCtrl options={[['all','All'],['s1','Semester 1'],['s2','Semester 2']]} value={semFilter} onChange={setSemFilter}/>}
          <Section title="Participation" entries={partEntries} avgVal={partAvg} emptyText="No participation grades yet." sectionKey="participation"/>
          {['Exam','Test','Presentation'].map(type=><Section key={type} title={TYPE_PLURAL[type]} entries={byType[type]} avgVal={typeAvg[type]} emptyText={`No ${type.toLowerCase()}s graded yet.`} sectionKey={type.toLowerCase()+'s'}/>)}

          {/* Homework — card-based collapsible */}
          <Card>
            <CollapsibleHeader title="Homework" right={hwStats?`${Math.round(hwStats.pct*100)}% → grade ${hwStats.grade}`:null} collapsed={collapsed.homework} onToggle={()=>toggle('homework')}/>
            {!collapsed.homework&&<>
              <Divider/>
              {hwEvents.length===0
                ?<div style={{padding:'12px 16px'}}><p style={{fontSize:13,color:'#CCC'}}>No homework assigned yet.</p></div>
                :hwEvents.map((ev,i)=>{const comp=ev.completions?.[studentId];return(<div key={ev.id}>{i>0&&<Divider/>}
                  <div onClick={()=>push('gradeEvent',{classId,eventId:ev.id})} style={{padding:'10px 16px',display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}>
                    <div style={{flex:1}}><div style={{fontSize:13,color:'#1C1C1E'}}>{ev.name}</div><div style={{display:'flex',gap:6,marginTop:3,alignItems:'center'}}><span style={{fontSize:12,color:'#999'}}>{fmtDate(ev.date)}</span><WeightBadge weight={ev.weight}/></div></div>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                    {comp?<span style={{fontSize:12,background:CS[comp].bg,color:CS[comp].fg,padding:'3px 10px',borderRadius:5,fontWeight:500}}>{CL[comp]}</span>:<span style={{fontSize:12,color:'#CCC'}}>—</span>}<ChevronRight size={13} color="#DDD"/>
                    </div>
                  </div>
                </div>);})
              }
            </>}
          </Card>

          <GradeCalcSection data={data} classId={classId} studentId={studentId} collapsed={collapsed.gradeCalc} onToggle={()=>toggle('gradeCalc')} semFilter={semFilter} cutoff={cutoff}/>

          {/* Category overview */}
          <Card>
            <CollapsibleHeader title="Category overview" collapsed={collapsed.catOverview} onToggle={()=>toggle('catOverview')}/>
            {!collapsed.catOverview&&<>
              <Divider/>
              <CategoryRow label="Participation" grade={partAvg} color={clsColor} note={partAvg!=null?fmtAvg(partAvg):null}/>
              <CategoryRow label="Homework" grade={hwStats?.grade??null} color={TS.Homework.fg} note={hwStats?`grade ${hwStats.grade}`:null}/>
              <CategoryRow label="Tests" grade={typeAvg.Test} color={TS.Test.fg} note={typeAvg.Test!=null?fmtAvg(typeAvg.Test):null}/>
              <CategoryRow label="Presentations" grade={typeAvg.Presentation} color={TS.Presentation.fg} note={typeAvg.Presentation!=null?fmtAvg(typeAvg.Presentation):null}/>
              <CategoryRow label="Exams" grade={typeAvg.Exam} color={TS.Exam.fg} note={typeAvg.Exam!=null?fmtAvg(typeAvg.Exam):null}/>
              <Divider/>
              <CategoryRow label="Final grade" grade={gradeResult.finalGrade} color={clsColor} note={gradeResult.finalGrade!=null?`${gradeResult.finalRounded} (${gradeResult.finalGrade.toFixed(2)})`:null} isTotal/>
            </>}
          </Card>

          {/* Statistics */}
          <Card>
            <CollapsibleHeader title="Statistics" collapsed={collapsed.stats} onToggle={()=>toggle('stats')}/>
            {!collapsed.stats&&<>
              <Divider/>
              <div style={{padding:'12px 16px 16px'}}>
                {partChartData.length===0&&gradeChartData.length===0
                  ?<p style={{fontSize:13,color:'#CCC',textAlign:'center',padding:'16px 0'}}>No data for the selected period.</p>
                  :<>
                    {partChartData.length>0&&<>
                      <p style={{fontSize:10,fontWeight:500,color:'#BBBBBB',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:6}}>Participation — {partChartData.length} data points</p>
                      <StudentChart partData={partChartData} gradeData={[]} clsColor={clsColor} dateRange={chartDateRange}/>
                      <div style={{display:'flex',gap:12,marginTop:4}}>
                        <span style={{fontSize:11,color:'#888',display:'flex',alignItems:'center',gap:5}}><span style={{width:14,height:2.5,background:clsColor,display:'inline-block',borderRadius:1,opacity:0.85}}/> Participation</span>
                        {partChartData.length>1&&<span style={{fontSize:11,color:'#AAA',display:'flex',alignItems:'center',gap:5}}><span style={{width:14,height:0,display:'inline-block',borderTop:`1.5px dashed ${clsColor}`,opacity:0.4}}/> Average</span>}
                      </div>
                    </>}
                    {partChartData.length>0&&gradeChartData.length>0&&<div style={{height:20}}/>}
                    {gradeChartData.length>0&&<>
                      <p style={{fontSize:10,fontWeight:500,color:'#BBBBBB',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:6}}>Grade events — {gradeChartData.length} events</p>
                      <StudentChart partData={[]} gradeData={gradeChartData} clsColor={clsColor} dateRange={chartDateRange}/>
                      <div style={{display:'flex',gap:10,marginTop:4,flexWrap:'wrap'}}>
                        {['Exam','Test','Presentation'].filter(t=>gradeChartData.some(d=>d.type===t)).map(t=>(
                          <span key={t} style={{fontSize:11,color:TS[t].fg,display:'flex',alignItems:'center',gap:4}}>
                            <span style={{width:11,height:11,borderRadius:'50%',background:TS[t].bg,border:`1.5px solid ${TS[t].fg}`,display:'inline-block'}}/> {t}
                          </span>
                        ))}
                      </div>
                    </>}
                    <p style={{fontSize:10,color:'#CCCCCC',marginTop:12,textAlign:'right'}}>1 = best · 5 = worst</p>
                  </>
                }
              </div>
            </>}
          </Card>

        </div>
      </div>);
    }

    // ── Lesson ─────────────────────────────────────────────────────────────────
    function LessonScreen({data,setData,pop,params}){
      const {lessonId}=params;
      const lesson=(data.lessons||[]).find(l=>l.id===lessonId);
      const cls=lesson&&data.classes.find(c=>c.id===lesson.classId);
      const hasData=lesson?Object.keys(lesson.students).length>0:false;
      const [locked,setLocked]=useState(hasData);
      const [warning,setWarning]=useState(false);
      const [delConfirm,setDelConfirm]=useState(false);
      if(!lesson||!cls)return null;
      const {date}=lesson;
      const clsColor=getCC(cls);
      const isAbsent=sid=>lesson.students[sid]?.absent===true;
      const [qOpen,setQOpen]=useState(false);
      const [qIdx,setQIdx]=useState(0);
      const qStudents=[...cls.students].sort((a,b)=>a.name.localeCompare(b.name));
      const qStudent=qOpen&&qIdx<qStudents.length?qStudents[qIdx]:null;
      function qNext(){if(qIdx+1>=qStudents.length)setQOpen(false);else setQIdx(i=>i+1);}
      function qGrade(g){const sid=qStudent.id;const ns={...lesson.students,[sid]:{...lesson.students[sid],absent:false,participation:g}};upd(ns);qNext();}
      function qAbsent(){const sid=qStudent.id;const ns={...lesson.students,[sid]:{absent:true,participation:null}};upd(ns);qNext();}
      const getGrade=sid=>lesson.students[sid]?.participation??null;
      const ungradedPresent=cls.students.filter(s=>!isAbsent(s.id)&&getGrade(s.id)===null).length;
      function upd(ns){setData(d=>({...d,lessons:d.lessons.map(l=>l.id===lessonId?{...l,students:ns}:l)}));}
      function toggleAbsent(sid){if(locked)return;const ns={...lesson.students};if(ns[sid]?.absent)delete ns[sid];else ns[sid]={absent:true,participation:null};upd(ns);}
      function setGrade(sid,g){if(locked)return;const ns={...lesson.students};if(g===null)delete ns[sid];else ns[sid]={absent:false,participation:g};upd(ns);}
      function tryLeave(){if(ungradedPresent>0){setWarning(true);return;}pop();}
      function deleteLesson(){setData(d=>({...d,lessons:d.lessons.filter(l=>l.id!==lessonId)}));pop();}
      const absentCount=cls.students.filter(s=>isAbsent(s.id)).length;
      const presentCount=cls.students.length-absentCount;
      const gradedCount=cls.students.filter(s=>!isAbsent(s.id)&&getGrade(s.id)!==null).length;
      return(<div>
        <Bar title={fmtDate(date)} onBack={tryLeave} color={clsColor} right={[
          <BarBtn key="del" onClick={()=>{setDelConfirm(v=>!v);setWarning(false);}} label="Delete"><TrashIcon size={15} color="white"/></BarBtn>,
          <BarBtn key="lock" onClick={()=>{setLocked(l=>!l);setWarning(false);}} label={locked?'Unlock':'Lock'}>{locked?<LockIcon size={15} color="white"/>:<UnlockIcon size={15} color="white"/>}</BarBtn>,
          ...(!locked?[<BarBtn key="qe" onClick={()=>{setQIdx(0);setQOpen(true);}} label="Quick entry"><FastFwdIcon size={15} color="white"/></BarBtn>]:[]),
        ]}/>
        {delConfirm&&<div style={{margin:'12px 16px 0',padding:'12px 14px',background:'#FCEBEB',border:'0.5px solid #F7C1C1',borderRadius:10}}>
          <p style={{fontSize:13,color:'#791F1F',marginBottom:10}}>Delete this lesson? All data will be removed.</p>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setDelConfirm(false)} style={{flex:1,padding:'8px',background:'none',border:'0.5px solid #F7C1C1',borderRadius:6,fontSize:13,color:'#791F1F',cursor:'pointer'}}>Cancel</button>
            <button onClick={deleteLesson} style={{flex:1,padding:'8px',background:'#791F1F',border:'none',borderRadius:6,fontSize:13,color:'white',cursor:'pointer',fontWeight:500}}>Delete</button>
          </div>
        </div>}
        {locked&&!delConfirm&&<LockedBanner/>}
        <div style={{padding:'10px 16px 4px',display:'flex',gap:6,flexWrap:'wrap'}}>
          <span style={{fontSize:12,background:'#EAF3DE',color:'#27500A',padding:'3px 10px',borderRadius:6}}>{presentCount} present</span>
          {absentCount>0&&<span style={{fontSize:12,background:'#FCEBEB',color:'#791F1F',padding:'3px 10px',borderRadius:6}}>{absentCount} absent</span>}
          <span style={{fontSize:12,background:'#F1EFE8',color:'#444441',padding:'3px 10px',borderRadius:6}}>{gradedCount}/{presentCount} graded</span>
        </div>
        {!locked&&<div style={{padding:'4px 16px 10px',fontSize:12,color:'#999'}}>Tap the circle to mark absent. Tap 1–5 to grade participation.</div>}
        <div style={{padding:'0 16px',marginTop:locked?10:0}}>
          <Card>{cls.students.map((s,i)=>{
            const absent=isAbsent(s.id),grade=getGrade(s.id);
            return(<div key={s.id}>{i>0&&<Divider/>}
              <div style={{paddingTop:10,paddingRight:16,paddingBottom:absent?10:0,paddingLeft:16,display:'flex',alignItems:'center',gap:12}}>
                <button onClick={()=>toggleAbsent(s.id)} style={{width:28,height:28,borderRadius:'50%',background:absent?'#FCEBEB':'#EAF3DE',border:'none',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:locked?'default':'pointer',opacity:locked?0.7:1}}>
                  {absent?<XIcon size={14} color="#791F1F" sw={2.5}/>:<Check size={14} color="#27500A" sw={2.5}/>}
                </button>
                <span style={{fontSize:14,flex:1,color:absent?'#999':'#1C1C1E'}}>{s.name}</span>
                {absent&&<span style={{fontSize:12,color:'#A32D2D',fontWeight:500}}>Absent</span>}
              </div>
              {!absent&&<div style={{paddingTop:6,paddingRight:16,paddingBottom:10,paddingLeft:56}}>
                <div style={{display:'flex',gap:4,opacity:locked?0.6:1}}>
                  {[1,2,3,4,5].map(g=>{const sel=grade===g;return<button key={g} onClick={()=>setGrade(s.id,sel?null:g)} style={{width:36,height:36,borderRadius:6,border:sel?`1.5px solid ${GS[g].bd}`:'0.5px solid #E0E0E5',background:sel?GS[g].bg:'white',color:sel?GS[g].fg:'#999',fontSize:14,fontWeight:sel?500:400,cursor:locked?'default':'pointer'}}>{g}</button>;})}
                </div>
              </div>}
            </div>);
          })}</Card>
        </div>
        <div style={{padding:'12px 16px 24px'}}>
          {!warning&&<PBtn label="Save & back" onClick={tryLeave}/>}
        </div>
        {warning&&<div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:540,padding:'12px 16px',background:'#FAEEDA',borderTop:'1px solid #FAC775',zIndex:200,boxSizing:'border-box'}}>
          <p style={{fontSize:13,color:'#633806',marginBottom:10}}>{ungradedPresent} student{ungradedPresent!==1?'s have':' has'} no participation grade yet.</p>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setWarning(false)} style={{flex:1,padding:'9px',background:'none',border:'0.5px solid #FAC775',borderRadius:7,fontSize:13,color:'#633806',cursor:'pointer',fontWeight:500}}>Keep grading</button>
            <button onClick={()=>pop()} style={{flex:1,padding:'9px',background:PURPLE,border:'none',borderRadius:7,fontSize:13,color:'white',cursor:'pointer',fontWeight:500}}>Save & leave</button>
          </div>
        </div>}
      {qOpen&&qStudent&&<div onClick={()=>setQOpen(false)} style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.45)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:300}}>
        <div onClick={e=>e.stopPropagation()} style={{background:'white',borderRadius:16,width:'min(320px,calc(100vw - 32px))',overflow:'hidden',boxShadow:'0 8px 40px rgba(0,0,0,0.25)'}}>
          <div style={{background:clsColor,padding:'12px 16px',display:'flex',alignItems:'center',gap:10}}>
            <span style={{color:'white',fontSize:14,fontWeight:500,flex:1}}>Quick entry – {qIdx+1}/{qStudents.length}</span>
            <button onClick={()=>setQOpen(false)} style={{background:'none',border:'none',cursor:'pointer',display:'flex',padding:4}}><XIcon size={17} color="white"/></button>
          </div>
          <div style={{padding:'24px 20px 12px',textAlign:'center'}}>
            <div style={{fontSize:17,fontWeight:600,color:'#1C1C1E'}}>{qStudent.name}</div>
          </div>
          <div style={{padding:'4px 20px 12px',display:'flex',gap:8,justifyContent:'center'}}>
            {[1,2,3,4,5].map(g=>{const cur=lesson.students[qStudent.id];const sel=!cur?.absent&&cur?.participation===g;return<button key={g} onClick={()=>qGrade(g)} style={{width:50,height:50,borderRadius:8,border:sel?`2px solid ${GS[g].bd}`:'0.5px solid #E0E0E5',background:sel?GS[g].bg:'white',color:sel?GS[g].fg:'#666',fontSize:18,fontWeight:sel?600:400,cursor:'pointer'}}>{g}</button>;})}  
          </div>
          <div style={{padding:'4px 20px 20px',display:'flex',gap:8}}>
            <button onClick={qAbsent} style={{flex:1,padding:'11px',background:lesson.students[qStudent.id]?.absent?'#FCEBEB':'none',border:'0.5px solid #F7C1C1',borderRadius:8,fontSize:14,color:'#791F1F',cursor:'pointer',fontWeight:lesson.students[qStudent.id]?.absent?500:400}}>Absent</button>
            <button onClick={()=>qNext()} style={{flex:1,padding:'11px',background:'none',border:'0.5px solid #E0E0E5',borderRadius:8,fontSize:14,color:'#666',cursor:'pointer'}}>Skip →</button>
          </div>
        </div>
      </div>}
      </div>);
    }

    // ── Add grade event ────────────────────────────────────────────────────────
    function AddGradeScreen({data,setData,pop,replace,params}){
      const {classId}=params;
      const cls=data.classes.find(c=>c.id===classId);
      const barColor=getCC(cls);
      const [type,setType]=useState(null);
      const [name,setName]=useState('');
      const [date,setDate]=useState(todayISO());
      const [weight,setWeight]=useState(2);
      function create(){if(!name.trim())return;const base={id:uid(),classId,type,name:name.trim(),date};const ev=type==='Homework'?{...base,weight,completions:{}}:{...base,scores:{}};setData(d=>({...d,gradeEvents:[...(d.gradeEvents||[]),ev]}));replace('gradeEvent',{classId,eventId:ev.id});}
      return(<div>
        <Bar title="New grade event" onBack={pop} color={barColor}/>
        <div style={{padding:16,display:'flex',flexDirection:'column',gap:16}}>
          <div>
            <label style={{fontSize:12,color:'#666',display:'block',marginBottom:8}}>Type</label>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{['Test','Homework','Presentation','Exam'].map(t=><button key={t} onClick={()=>setType(t)} style={{flex:'1 1 calc(50% - 4px)',padding:'10px 0',borderRadius:8,border:type===t?`2px solid ${TS[t]?.fg}`:'0.5px solid #D0D0D8',background:type===t?TS[t]?.bg:'white',color:type===t?TS[t]?.fg:'#666',fontSize:13,fontWeight:type===t?500:400,cursor:'pointer'}}>{t}</button>)}</div>
          </div>
          <FI label="Name" placeholder={type==='Homework'?'e.g. "Essay: My hometown"':type==='Presentation'?'e.g. "Term 1 presentation"':'e.g. "Chapter 5 test"'} value={name} onChange={e=>setName(e.target.value)}/>
          <FI label="Date" type="date" value={date} onChange={e=>setDate(e.target.value)}/>
          {type==='Homework'&&(<div>
            <label style={{fontSize:12,color:'#666',display:'block',marginBottom:4}}>Weight</label>
            <div style={{fontSize:12,color:'#999',marginBottom:8}}>1 = standard, 2 = important, 3 = major assignment</div>
            <div style={{display:'flex',gap:8}}>{[1,2,3].map(w=><button key={w} onClick={()=>setWeight(w)} style={{flex:1,padding:'10px 0',borderRadius:8,border:weight===w?`2px solid ${PURPLE}`:'0.5px solid #D0D0D8',background:weight===w?'#EEEDFE':'white',color:weight===w?PURPLE:'#666',fontSize:15,fontWeight:weight===w?500:400,cursor:'pointer'}}>{w}</button>)}</div>
          </div>)}
          <PBtn label={type==='Homework'?'Create & mark homework →':'Create & enter grades →'} onClick={create} disabled={!name.trim()||!type}/>
        </div>
      </div>);
    }

    // ── Grade event ────────────────────────────────────────────────────────────
    function GradeEventScreen({data,setData,pop,params}){
      const {classId,eventId}=params;
      const cls=data.classes.find(c=>c.id===classId);
      const ev=(data.gradeEvents||[]).find(e=>e.id===eventId);
      const isHW=ev?.type==='Homework';
      const hasData=ev?(isHW?Object.keys(ev.completions||{}).length>0:Object.keys(ev.scores||{}).length>0):false;
      const [locked,setLocked]=useState(hasData);
      const [delConfirm,setDelConfirm]=useState(false);
      const [editName,setEditName]=useState(ev?.name||'');
      if(!cls||!ev)return null;
      const clsColor=getCC(cls);
      const [qOpen,setQOpen]=useState(false);
      const [qIdx,setQIdx]=useState(0);
      const qStudents=[...cls.students].sort((a,b)=>a.name.localeCompare(b.name));
      const qStudent=qOpen&&qIdx<qStudents.length?qStudents[qIdx]:null;
      function qNext(){if(qIdx+1>=qStudents.length)setQOpen(false);else setQIdx(i=>i+1);}
      function qGrade(g){setGrade(qStudent.id,g);qNext();}
      function qCompletion(status){setCompletion(qStudent.id,status);qNext();}
      function saveEventName(){if(!editName.trim())return;setData(d=>({...d,gradeEvents:d.gradeEvents.map(e=>e.id!==eventId?e:{...e,name:editName.trim()})}));}
      function updateEvDate(v){setData(d=>({...d,gradeEvents:d.gradeEvents.map(e=>e.id!==eventId?e:{...e,date:v})}));}
      function updateEvWeight(w){setData(d=>({...d,gradeEvents:d.gradeEvents.map(e=>e.id!==eventId?e:{...e,weight:w})}));}
      function setGrade(sid,g){if(locked)return;setData(d=>({...d,gradeEvents:d.gradeEvents.map(e=>e.id!==eventId?e:{...e,scores:g==null?Object.fromEntries(Object.entries(e.scores||{}).filter(([k])=>k!==sid)):{...(e.scores||{}),[sid]:g}})}));}
      function setCompletion(sid,status){if(locked)return;setData(d=>({...d,gradeEvents:d.gradeEvents.map(e=>e.id!==eventId?e:{...e,completions:status==null?Object.fromEntries(Object.entries(e.completions||{}).filter(([k])=>k!==sid)):{...(e.completions||{}),[sid]:status}})}));}
      function setNote(sid,text){setData(d=>({...d,gradeEvents:d.gradeEvents.map(e=>e.id!==eventId?e:{...e,notes:{...(e.notes||{}),[sid]:text}})}));}
      function deleteEvent(){setData(d=>({...d,gradeEvents:d.gradeEvents.filter(e=>e.id!==eventId)}));pop();}
      const graded=isHW?cls.students.filter(s=>ev.completions?.[s.id]!=null).length:cls.students.filter(s=>ev.scores?.[s.id]!=null).length;
      return(<div>
        <Bar title={ev.name} onBack={pop} color={clsColor} right={[
          <BarBtn key="del" onClick={()=>setDelConfirm(v=>!v)} label="Delete"><TrashIcon size={15} color="white"/></BarBtn>,
          <BarBtn key="lock" onClick={()=>setLocked(l=>!l)} label={locked?'Unlock':'Lock'}>{locked?<LockIcon size={15} color="white"/>:<UnlockIcon size={15} color="white"/>}</BarBtn>,
          ...(!locked?[<BarBtn key="qe" onClick={()=>{setQIdx(0);setQOpen(true);}} label="Quick entry"><FastFwdIcon size={15} color="white"/></BarBtn>]:[]),
          ...(isHW?[<WeightBadge key="w" weight={ev.weight}/>].filter(Boolean):[]),
          <span key="type" style={{background:TS[ev.type]?.bg,color:TS[ev.type]?.fg,fontSize:12,padding:'4px 10px',borderRadius:6,fontWeight:500}}>{ev.type}</span>,
        ]}/>
        {delConfirm&&<div style={{margin:'12px 16px 0',padding:'12px 14px',background:'#FCEBEB',border:'0.5px solid #F7C1C1',borderRadius:10}}>
          <p style={{fontSize:13,color:'#791F1F',marginBottom:10}}>Delete "{ev.name}"? All data will be removed.</p>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setDelConfirm(false)} style={{flex:1,padding:'8px',background:'none',border:'0.5px solid #F7C1C1',borderRadius:6,fontSize:13,color:'#791F1F',cursor:'pointer'}}>Cancel</button>
            <button onClick={deleteEvent} style={{flex:1,padding:'8px',background:'#791F1F',border:'none',borderRadius:6,fontSize:13,color:'white',cursor:'pointer',fontWeight:500}}>Delete</button>
          </div>
        </div>}
        {locked&&!delConfirm&&<LockedBanner/>}
        {!locked&&!delConfirm&&<div style={{padding:'10px 16px 4px',display:'flex',flexDirection:'column',gap:12}}>
          <FI label="Name" value={editName} onChange={e=>setEditName(e.target.value)} onBlur={saveEventName}/>
          <FI label="Date" type="date" value={ev.date} onChange={e=>updateEvDate(e.target.value)}/>
          {isHW&&<div>
            <label style={{fontSize:12,color:'#666',display:'block',marginBottom:4}}>Weight</label>
            <div style={{fontSize:12,color:'#999',marginBottom:8}}>1 = standard, 2 = important, 3 = major</div>
            <div style={{display:'flex',gap:8}}>{[1,2,3].map(w=>{const sel=(ev.weight||2)===w;return<button key={w} onClick={()=>updateEvWeight(w)} style={{flex:1,padding:'9px 0',borderRadius:8,border:sel?`2px solid ${PURPLE}`:'0.5px solid #D0D0D8',background:sel?'#EEEDFE':'white',color:sel?PURPLE:'#666',fontSize:13,cursor:'pointer'}}>{w}</button>;})}</div>
          </div>}
        </div>}
        <div style={{padding:'10px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:13,color:'#666'}}>{fmtDate(ev.date)}</span>
          <span style={{fontSize:12,color:'#999'}}>{graded} / {cls.students.length} {isHW?'marked':'graded'}</span>
        </div>
        {!locked&&<div style={{padding:'0 16px 8px',fontSize:12,color:'#999'}}>{isHW?'Tap a status to mark. Tap again to clear.':'Tap a grade to assign it. Tap again to clear.'}</div>}
        <div style={{padding:'0 16px'}}>
          <Card>{cls.students.map((s,i)=>{
            if(isHW){
              const comp=ev.completions?.[s.id];
              return(<div key={s.id}>{i>0&&<Divider/>}
                <div style={{paddingTop:10,paddingRight:16,paddingBottom:0,paddingLeft:16}}><span style={{fontSize:14,color:'#1C1C1E'}}>{s.name}</span></div>
                <div style={{paddingTop:6,paddingRight:16,paddingBottom:10,paddingLeft:16,display:'flex',gap:6,opacity:locked?0.6:1}}>
                  {['done','partial','not_done'].map(status=>{const sel=comp===status;return<button key={status} onClick={()=>setCompletion(s.id,sel?null:status)} style={{flex:1,padding:'8px 4px',borderRadius:6,border:sel?`1.5px solid ${CS[status].bd}`:'0.5px solid #E0E0E5',background:sel?CS[status].bg:'white',color:sel?CS[status].fg:'#999',fontSize:13,fontWeight:sel?500:400,cursor:locked?'default':'pointer'}}>{CL[status]}</button>;})}
                </div>
              </div>);
            }
            const grade=ev.scores?.[s.id];
            return(<div key={s.id}>{i>0&&<Divider/>}
              <div style={{padding:'10px 16px',display:'flex',alignItems:'center',gap:12}}>
                <span style={{fontSize:14,flex:1}}>{s.name}</span>
                <div style={{display:'flex',gap:4,opacity:locked?0.6:1}}>
                  {[1,2,3,4,5].map(g=>{const sel=grade===g;return<button key={g} onClick={()=>setGrade(s.id,sel?null:g)} style={{width:36,height:36,borderRadius:6,border:sel?`1.5px solid ${GS[g].bd}`:'0.5px solid #E0E0E5',background:sel?GS[g].bg:'white',color:sel?GS[g].fg:'#999',fontSize:14,fontWeight:sel?500:400,cursor:locked?'default':'pointer'}}>{g}</button>;})}
                </div>
              </div>
              {ev.type==='Presentation'&&(
                locked
                  ?(ev.notes?.[s.id]?<div style={{padding:'2px 16px 10px',fontSize:12,color:'#999',fontStyle:'italic'}}>{ev.notes[s.id]}</div>:null)
                  :<div style={{padding:'2px 16px 10px'}}>
                    <input type="text" placeholder="Presentation topic…" value={ev.notes?.[s.id]||''}
                      onChange={e=>setNote(s.id,e.target.value)}
                      style={{width:'100%',fontSize:12,padding:'5px 9px',borderRadius:6,border:'0.5px solid #D0D0D8',color:'#555',background:'white',fontFamily:'inherit',boxSizing:'border-box'}}/>
                  </div>
              )}
            </div>);
          })}</Card>
        </div>
        {qOpen&&qStudent&&<div onClick={()=>setQOpen(false)} style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.45)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:300}}>
          <div onClick={e=>e.stopPropagation()} style={{background:'white',borderRadius:16,width:'min(320px,calc(100vw - 32px))',overflow:'hidden',boxShadow:'0 8px 40px rgba(0,0,0,0.25)'}}>
            <div style={{background:clsColor,padding:'12px 16px',display:'flex',alignItems:'center',gap:10}}>
              <span style={{color:'white',fontSize:14,fontWeight:500,flex:1}}>Quick entry – {qIdx+1}/{qStudents.length}</span>
              <button onClick={()=>setQOpen(false)} style={{background:'none',border:'none',cursor:'pointer',display:'flex',padding:4}}><XIcon size={17} color="white"/></button>
            </div>
            <div style={{padding:'24px 20px 12px',textAlign:'center'}}>
              <div style={{fontSize:17,fontWeight:600,color:'#1C1C1E'}}>{qStudent.name}</div>
            </div>
            {isHW
              ?<>
                <div style={{padding:'4px 20px 16px',display:'flex',gap:8}}>
                  {['done','partial','not_done'].map(st=>{const sel=(ev.completions?.[qStudent.id])===st;return<button key={st} onClick={()=>qCompletion(st)} style={{flex:1,padding:'10px 4px',borderRadius:8,border:sel?`1.5px solid ${CS[st].bd}`:'0.5px solid #E0E0E5',background:sel?CS[st].bg:'white',color:sel?CS[st].fg:'#666',fontSize:13,fontWeight:sel?500:400,cursor:'pointer'}}>{CL[st]}</button>;})}
                </div>
              </>
              :<>
                <div style={{padding:'4px 20px 12px',display:'flex',gap:8,justifyContent:'center'}}>
                  {[1,2,3,4,5].map(g=>{const sel=(ev.scores?.[qStudent.id])===g;return<button key={g} onClick={()=>qGrade(g)} style={{width:50,height:50,borderRadius:8,border:sel?`2px solid ${GS[g].bd}`:'0.5px solid #E0E0E5',background:sel?GS[g].bg:'white',color:sel?GS[g].fg:'#666',fontSize:18,fontWeight:sel?600:400,cursor:'pointer'}}>{g}</button>;})}
                </div>
              </>
            }
            <div style={{padding:'4px 20px 20px'}}>
              <button onClick={()=>qNext()} style={{width:'100%',padding:'11px',background:'none',border:'0.5px solid #E0E0E5',borderRadius:8,fontSize:14,color:'#666',cursor:'pointer'}}>Skip →</button>
            </div>
          </div>
        </div>}
        <div style={{padding:'12px 16px 24px'}}><PBtn label="Save & back" onClick={pop}/></div>
      </div>);
    }

    const root=ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
